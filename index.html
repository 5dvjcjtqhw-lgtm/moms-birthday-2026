<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Mom ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #fdf5ec;
      --rose:        #c4758a;
      --rose-dark:   #a05570;
      --rose-light:  #f7e0e8;
      --gold:        #c9a84c;
      --gold-light:  #faf0d3;
      --brown:       #3d2416;
      --brown-soft:  #7a5c4d;
      --card-bg:     #fffcf8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--brown);
      font-family: 'Lato', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── HERO ──────────────────────────────────── */

    #hero {
      position: relative;
      width: 100%;
      min-height: 100svh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      background-color: #efe8d5;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23n)' opacity='0.18'/></svg>");
      background-size: 180px 180px;
    }

    /* Thin card-border frame */
    #hero::before {
      content: '';
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(196,117,138,0.18);
      border-radius: 3px;
      pointer-events: none;
      z-index: 0;
    }

    #hero-bg, #hero-overlay { display: none; }

    /* Botanical corner art */
    .botanical {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      opacity: 0.88;
    }
    .botanical-tl { top: 0; left: 0; width: 200px; height: 200px; }
    .botanical-br { bottom: 0; right: 0; width: 200px; height: 200px; }

    @media (max-width: 600px) {
      .botanical { opacity: 0.5; }
      .botanical-tl { width: 130px; height: 130px; }
      .botanical-br { width: 130px; height: 130px; }
      #hero::before { inset: 10px; }
    }

    #hero-content {
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem 4.5rem;
      max-width: 640px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: var(--brown-soft);
      letter-spacing: 0.07em;
      margin-bottom: 1.25rem;
      transition: opacity 0.6s;
    }

    .hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.75rem, 9.5vw, 5.75rem);
      font-weight: 700;
      color: var(--brown);
      line-height: 1.2;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
      margin-bottom: 1.1rem;
    }

    .title-greeting {
      display: block;
      font-style: italic;
      font-weight: 400;
      font-size: 0.42em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown-soft);
      margin-bottom: 0.3em;
    }

    .title-name {
      display: block;
      font-style: italic;
      font-weight: 400;
      font-size: 0.42em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown-soft);
    }

    .hero-sub {
      font-size: clamp(0.9rem, 2.2vw, 1.05rem);
      font-weight: 300;
      color: var(--brown-soft);
      line-height: 1.7;
      letter-spacing: 0.03em;
      margin-bottom: 2.75rem;
      transition: opacity 0.6s;
    }

    /* ── PROGRESS ───────────────────────────────── */

    #progress {
      margin-bottom: 2.2rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    #progress.visible { opacity: 1; transform: none; }

    #progress-text {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brown-soft);
      margin-bottom: 0.55rem;
    }

    #progress-track {
      width: 190px;
      height: 3px;
      background: rgba(61,36,22,0.1);
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--rose-light), var(--rose));
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── BUTTON ─────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.9rem 2.2rem;
      background: linear-gradient(135deg, #d4849a, var(--rose-dark));
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(160, 85, 112, 0.5);
      transition: transform 0.17s ease, box-shadow 0.17s ease;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(rgba(255,255,255,0.16), transparent);
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px rgba(160,85,112,0.6); }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 4px 24px rgba(160,85,112,0.5), 0 0 0 0   rgba(196,117,138,0.6); }
      70%  { box-shadow: 0 4px 24px rgba(160,85,112,0.5), 0 0 0 16px rgba(196,117,138,0);  }
      100% { box-shadow: 0 4px 24px rgba(160,85,112,0.5), 0 0 0 0   rgba(196,117,138,0);  }
    }
    #hero-btn { animation: pulse-ring 2.4s ease-out infinite; }
    #hero-btn.still { animation: none; }

    /* ── CARDS AREA ─────────────────────────────── */

    #cards-area {
      max-width: 720px;
      margin: 0 auto;
      padding: 3.5rem 1.25rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* ── GIFT CARD ──────────────────────────────── */

    .card {
      background: var(--card-bg);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(201,168,76,0.2);
      box-shadow:
        0 8px 48px rgba(61,36,22,0.1),
        0 2px 6px rgba(61,36,22,0.06);
      scroll-margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(52px) scale(0.97);
    }
    .card.revealed {
      animation: card-in 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(52px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Ribbon strip */
    .card-ribbon {
      position: relative;
      height: 42px;
      background: linear-gradient(to right, var(--rose-light), var(--rose), var(--rose-light));
    }
    .card-ribbon::after {
      content: '🎀';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem;
      line-height: 1;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.12));
    }
    .card-final .card-ribbon {
      height: 42px;
      background: linear-gradient(to right, var(--gold-light), var(--gold), var(--gold-light));
    }
    .card-final .card-ribbon::after { content: '🎉'; font-size: 1.85rem; }

    /* Photo */
    .card-photo {
      width: 100%;
      aspect-ratio: 3/2;
      overflow: hidden;
      background: linear-gradient(135deg, var(--rose-light) 0%, var(--gold-light) 100%);
      position: relative;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 7s ease;
    }
    .card:hover .card-photo img { transform: scale(1.045); }
    .card-photo-fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      opacity: 0.25;
    }

    /* Body */
    .card-body { padding: 1.8rem 2.1rem 0; }

    .card-chip {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--rose-dark);
      background: var(--rose-light);
      border-radius: 5px;
      padding: 0.28em 0.8em;
      margin-bottom: 0.9rem;
    }
    .card-final .card-chip { color: #9a7420; background: var(--gold-light); }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.45rem, 4vw, 1.95rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--brown);
    }

    .card-rule {
      width: 44px;
      height: 2px;
      background: linear-gradient(to right, var(--rose), transparent);
      border: none;
      margin: 0 0 1.15rem;
    }
    .card-final .card-rule { background: linear-gradient(to right, var(--gold), transparent); }

    .card-message {
      font-size: 1.02rem;
      font-weight: 300;
      line-height: 1.88;
      color: var(--brown-soft);
    }
    .card-final .card-message {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.8vw, 1.35rem);
      line-height: 2.1;
      color: var(--brown);
      text-align: center;
    }

    /* Coupon */
    .coupon {
      margin: 1.85rem 0 0;
      border: 2.5px dashed var(--gold);
      border-radius: 14px;
      padding: 1.3rem 1.5rem;
      background: var(--gold-light);
      text-align: center;
    }
    .coupon-snip {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 0.7rem;
    }
    .coupon-main {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.08rem;
      color: var(--brown);
      margin-bottom: 0.4rem;
    }
    .coupon-exp {
      font-size: 0.78rem;
      color: var(--brown-soft);
      letter-spacing: 0.05em;
    }

    /* Footer / next button */
    .card-footer {
      padding: 1.6rem 2.1rem 2.1rem;
      text-align: center;
    }

    /* ── CONFETTI CANVAS ────────────────────────── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 480px) {
      .card-body   { padding: 1.4rem 1.25rem 0; }
      .card-footer { padding: 1.3rem 1.25rem 1.6rem; }
      .btn { padding: 0.85rem 1.7rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- ── HERO ────────────────────────────────────── -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>

  <!-- ── TOP-LEFT botanical ── -->
  <svg class="botanical botanical-tl" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 200 200" aria-hidden="true">
    <g id="bot">
      <!-- Main arc: left-edge to top-edge, hugging the corner -->
      <path d="M 5,108 C 10,72 24,34 58,14 C 78,4 102,2 122,2"
            fill="none" stroke="#c0a082" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Branch A: from arc at ~(22,62) sweeping inward -->
      <path d="M 22,62 C 36,74 52,88 64,108"
            fill="none" stroke="#c0a082" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Branch B: from arc at ~(72,12) sweeping inward -->
      <path d="M 72,12 C 82,28 90,50 98,74"
            fill="none" stroke="#c0a082" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Flower A at branch A tip (cx=66, cy=112) — medium rose -->
      <g transform="translate(66,112)">
        <ellipse cx="0" cy="-12" rx="6"   ry="11"  fill="#e2aabe" opacity="0.75"/>
        <ellipse cx="0" cy="-12" rx="6"   ry="11"  fill="#e2aabe" opacity="0.75" transform="rotate(72)"/>
        <ellipse cx="0" cy="-12" rx="6"   ry="11"  fill="#e2aabe" opacity="0.75" transform="rotate(144)"/>
        <ellipse cx="0" cy="-12" rx="6"   ry="11"  fill="#e2aabe" opacity="0.75" transform="rotate(216)"/>
        <ellipse cx="0" cy="-12" rx="6"   ry="11"  fill="#e2aabe" opacity="0.75" transform="rotate(288)"/>
        <circle r="5.5" fill="#f0d070" opacity="0.88"/>
      </g>

      <!-- Flower B at branch B tip (cx=100, cy=78) — slightly larger -->
      <g transform="translate(100,78)">
        <ellipse cx="0" cy="-14" rx="7.5" ry="13"  fill="#e2aabe" opacity="0.72"/>
        <ellipse cx="0" cy="-14" rx="7.5" ry="13"  fill="#e2aabe" opacity="0.72" transform="rotate(72)"/>
        <ellipse cx="0" cy="-14" rx="7.5" ry="13"  fill="#e2aabe" opacity="0.72" transform="rotate(144)"/>
        <ellipse cx="0" cy="-14" rx="7.5" ry="13"  fill="#e2aabe" opacity="0.72" transform="rotate(216)"/>
        <ellipse cx="0" cy="-14" rx="7.5" ry="13"  fill="#e2aabe" opacity="0.72" transform="rotate(288)"/>
        <circle r="6"   fill="#f0d070" opacity="0.88"/>
      </g>

      <!-- Small bud at arc tip (cx=122, cy=2) -->
      <g transform="translate(122,8)">
        <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="#d8a0b2" opacity="0.7"/>
        <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="#d8a0b2" opacity="0.7" transform="rotate(80)"/>
        <circle r="3" fill="#f0d070" opacity="0.8"/>
      </g>

      <!-- Leaves — pairs along main arc -->
      <ellipse cx="12"  cy="84"  rx="3.5" ry="10" fill="#8aaa70" opacity="0.62" transform="rotate(-30,  12, 84)"/>
      <ellipse cx="28"  cy="72"  rx="3.5" ry="10" fill="#8aaa70" opacity="0.62" transform="rotate( 55,  28, 72)"/>
      <ellipse cx="34"  cy="36"  rx="3"   ry="9"  fill="#8aaa70" opacity="0.58" transform="rotate(-52,  34, 36)"/>
      <ellipse cx="48"  cy="24"  rx="3"   ry="9"  fill="#8aaa70" opacity="0.58" transform="rotate( 38,  48, 24)"/>
      <ellipse cx="88"  cy="8"   rx="2.5" ry="8"  fill="#8aaa70" opacity="0.55" transform="rotate(-80,  88,  8)"/>
      <ellipse cx="102" cy="5"   rx="2.5" ry="8"  fill="#8aaa70" opacity="0.55" transform="rotate(  8, 102,  5)"/>

      <!-- Leaves along branch A -->
      <ellipse cx="38"  cy="80"  rx="3"   ry="8.5" fill="#8aaa70" opacity="0.58" transform="rotate(-25,  38, 80)"/>
      <ellipse cx="52"  cy="94"  rx="3"   ry="8.5" fill="#8aaa70" opacity="0.58" transform="rotate( 60,  52, 94)"/>

      <!-- Berries -->
      <circle cx="34" cy="50" r="3"   fill="#d09098" opacity="0.65"/>
      <circle cx="28" cy="43" r="2.5" fill="#d09098" opacity="0.58"/>
      <circle cx="82" cy="20" r="2.5" fill="#d09098" opacity="0.58"/>
      <circle cx="58" cy="96" r="2"   fill="#d09098" opacity="0.52"/>
    </g>
  </svg>

  <!-- ── BOTTOM-RIGHT botanical (same art, rotated 180°) ── -->
  <svg class="botanical botanical-br" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 200 200" aria-hidden="true">
    <use href="#bot" transform="rotate(180, 100, 100)"/>
  </svg>

  <div id="hero-content">
    <p class="eyebrow" id="eyebrow">A little something just for you</p>
    <h1 class="hero-title">
      <span class="title-greeting">Happy Birthday</span>
      <span class="title-name">Mom</span>
    </h1>
    <p class="hero-sub" id="hero-sub">Four gifts, opened one at a time.<br>Press the button whenever you're ready.</p>
    <div id="progress">
      <p id="progress-text">Gift 1 of 6</p>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
    <button class="btn" id="hero-btn" onclick="revealNext(this)">
      <span aria-hidden="true">🎁</span>
      <span id="hero-btn-label">Open Gift #1</span>
    </button>
  </div>
</section>

<!-- ── CARDS ──────────────────────────────────── -->
<main id="cards-area" aria-live="polite"></main>

<script>
  /* ═══════════════════════════════════════════════
     GIFT DATA  ← edit this array to change everything
     ═══════════════════════════════════════════════ */
  const GIFTS = [
    {
      image:   'gift1.jpeg',
      imagePosition: 'center 25%',
      label:   'Gift #1',
      title:   'Lifetime Tech Support',
      message: 'This voucher entitles the holder to unlimited tech support from Brendan.\n\nCovered services include:\n• Phone issues\n• TV issues\n• Password resets\n• "Can you take a look at this?"\n\nExpires: Never',
    },
    {
      image:   'gift2.jpeg',
      imagePosition: 'center 25%',
      label:   'Gift #2',
      title:   'Unlimited Phone Calls',
      message: 'This certificate entitles the holder to unlimited calls with Brendan.\n\nNo scheduling required.\n\nRedeemable for:\n• Life updates\n• Advice requests\n• Airport calls\n• Random thoughts\n\nExpires: Never',
    },
    {
      image:   'gift3.jpeg',
      imagePosition: 'center 30%',
      label:   'Gift #3',
      title:   'Lifetime Laundry Privileges',
      message: 'This voucher entitles the holder to continue doing Brendan\'s laundry whenever she feels inclined.\n\nParticipation is entirely voluntary.\n\nBrendan reserves the right to remain extremely appreciative.\n\nExpires: Never',
    },
    {
      image:   'gift4.jpeg',
      imagePosition: 'center 20%',
      label:   'Grand Prize',
      title:   '🎉 Grand Prize 🎉',
      message: 'Happy Birthday Mom ❤️\n\nLove,\nBrendan',
      isFinal: true,
    },
  ];

  /* ═══════════════════════════════════════════════
     BUILD CARDS (hidden; revealed one by one)
     ═══════════════════════════════════════════════ */
  const TOTAL     = GIFTS.length;
  const cardsArea = document.getElementById('cards-area');

  GIFTS.forEach((g, i) => {
    const isLast    = i === TOTAL - 1;
    const nextLabel = isLast        ? null
      : i === TOTAL - 2             ? 'Open Grand Prize 🎉'
      :                               `Open Gift #${i + 2}`;

    const card = document.createElement('article');
    card.id        = `card-${i}`;
    card.className = 'card' + (g.isFinal ? ' card-final' : '');

    card.innerHTML = `
      <div class="card-ribbon"></div>
      <div class="card-photo">
        <img src="${g.image}" alt="${g.label}" loading="lazy"
             style="object-position: ${g.imagePosition || 'center'}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="card-photo-fallback">📷</div>
      </div>
      <div class="card-body">
        <span class="card-chip">${g.label}</span>
        <h2 class="card-title">${g.title}</h2>
        <hr class="card-rule" />
        <p class="card-message">${g.message.replace(/\n/g, '<br>')}</p>
        ${g.isFinal ? `
          <div class="coupon">
            <p class="coupon-snip">✂ — — — — cut here — — — — ✂</p>
            <p class="coupon-main">🎟 This coupon is redeemable for one birthday hug.</p>
            <p class="coupon-exp">No blackout dates. No expiration date.</p>
          </div>
        ` : ''}
      </div>
      ${nextLabel ? `
        <div class="card-footer">
          <button class="btn" onclick="revealNext(this)">
            <span aria-hidden="true">🎁</span><span>${nextLabel}</span>
          </button>
        </div>
      ` : ''}
    `;

    cardsArea.appendChild(card);
  });

  /* ═══════════════════════════════════════════════
     REVEAL LOGIC
     ═══════════════════════════════════════════════ */
  let revealed = 0;

  function revealNext(btn) {
    if (revealed >= TOTAL) return;
    btn.disabled = true;
    btn.classList.add('still');

    const card = document.getElementById(`card-${revealed}`);
    card.classList.add('revealed');

    const idx = ++revealed;

    const progress  = document.getElementById('progress');
    const progText  = document.getElementById('progress-text');
    const progFill  = document.getElementById('progress-fill');
    const heroBtn   = document.getElementById('hero-btn');

    // Show progress indicator
    progress.classList.add('visible');
    progFill.style.width = `${(idx / TOTAL) * 100}%`;

    if (idx === TOTAL) {
      progText.textContent = '🎉 All gifts opened!';
      document.getElementById('eyebrow').textContent  = '🎉 Happy Birthday, Mom! 🎉';
      document.getElementById('hero-sub').textContent = 'All gifts revealed. Hope you loved every one. ❤️';
    } else {
      progText.textContent = `Gift ${idx} of ${TOTAL}`;
    }

    // Hero button only fires once; card buttons take over after that
    heroBtn.style.display = 'none';

    // Smooth scroll to new card with a small breathing gap above it
    setTimeout(() => {
      const top = card.getBoundingClientRect().top + window.pageYOffset - 20;
      window.scrollTo({ top, behavior: 'smooth' });
    }, 90);

    // Confetti burst on final reveal
    if (idx === TOTAL) setTimeout(spawnConfetti, 550);
  }

  /* ═══════════════════════════════════════════════
     KEN BURNS on hero background
     ═══════════════════════════════════════════════ */
  window.addEventListener('load', () => {
    document.getElementById('hero').classList.add('ready');
  });

  /* ═══════════════════════════════════════════════
     CONFETTI
     ═══════════════════════════════════════════════ */
  function spawnConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const palette = ['#c4758a','#c9a84c','#f7e0e8','#ffffff','#faf0d3','#e89ab8','#f5d47a','#ff9eb5'];

    const bits = Array.from({ length: 150 }, () => ({
      x:      Math.random() * canvas.width,
      y:      -(Math.random() * canvas.height * 0.5 + 40),
      w:      Math.random() * 12 + 5,
      h:      Math.random() * 6  + 3,
      color:  palette[Math.random() * palette.length | 0],
      vy:     Math.random() * 2.8 + 1.5,
      angle:  Math.random() * Math.PI * 2,
      spin:   (Math.random() - 0.5) * 0.13,
      sway:   (Math.random() - 0.5) * 1.4,
      swayF:  Math.random() * 0.04 + 0.01,
      t:      Math.random() * Math.PI * 2,
    }));

    let frame = 0;
    function draw() {
      if (frame > 340) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = frame > 260 ? Math.max(0, 1 - (frame - 260) / 80) : 1;

      bits.forEach(b => {
        b.y     += b.vy;
        b.angle += b.spin;
        b.t     += b.swayF;
        b.x     += Math.sin(b.t) * b.sway;

        ctx.save();
        ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
        ctx.rotate(b.angle);
        ctx.fillStyle = b.color;
        ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
        ctx.restore();
      });

      frame++;
      requestAnimationFrame(draw);
    }
    draw();
  }
</script>
